- table:
    name: np_torrentmanager_torrent_clients
    schema: public
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - client_type
          - status
          - is_default
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        columns:
          - source_account_id
          - client_type
          - host
          - port
          - username
          - password_encrypted
          - is_default
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

- table:
