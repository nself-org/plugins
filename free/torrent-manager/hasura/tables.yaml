- table:
    name: np_torrentmanager_torrent_downloads
    schema: public
  object_relationships:
    - name: client
      using:
        foreign_key_constraint_on: client_id
  array_relationships:
    - name: files
      using:
        foreign_key_constraint_on:
          column: download_id
          table:
            name: np_torrentmanager_torrent_files
            schema: public
    - name: trackers
      using:
        foreign_key_constraint_on:
          column: download_id
          table:
            name: np_torrentmanager_torrent_trackers
            schema: public
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - name
          - status
          - category
          - progress_percent
          - size_bytes
          - downloaded_bytes
          - added_at
          - completed_at
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  event_triggers:
    - name: torrent_download_status_change
      definition:
        enable_manual: false
        update:
          columns:
            - status
      retry_conf:
        interval_sec: 10
        num_retries: 3
        timeout_sec: 60
      webhook: "{{TORRENT_MANAGER_EVENT_TRIGGER_URL}}"
      headers:
        - name: X-Nself-Plugin
          value: torrent-manager

