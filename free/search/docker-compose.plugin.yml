# NSELF-FIRST EXCEPTION: plugin-fragment — hand-authored plugin service definition, merged by `nself build`. Not side-channel.
services:
  search:
    image: nself/nself-search:latest
    container_name: ${COMPOSE_PROJECT_NAME}_search
    restart: unless-stopped
    networks:
      - ${DOCKER_NETWORK}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "3302"
      PLUGIN_INTERNAL_SECRET: ${PLUGIN_INTERNAL_SECRET:-}
    ports:
      - "127.0.0.1:3302:3302"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3302/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${PLUGIN_SEARCH_MEMORY:-256m}
          cpus: '${PLUGIN_SEARCH_CPU:-0.5}'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
