# search plugin Hasura metadata
# CODE WINS: 2 tables from internal/db.go (not 5 as spec said)
# Actual tables: np_search_indexes, np_search_documents
# Note: spec referenced np_search_queries/results_cache/settings/sync_log — not in code.
# np_search_indexes: admin CRUD + user read; np_search_documents: admin CRUD + user read

- table:
    schema: public
    name: np_search_indexes
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - name
          - type
          - status
          - document_count
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

- table:
    schema: public
    name: np_search_documents
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
