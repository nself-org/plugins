        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
