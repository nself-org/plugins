# NSELF-FIRST EXCEPTION: plugin-fragment — hand-authored plugin service definition, merged by `nself build`. Not side-channel.
services:
  content-progress:
    build:
      context: ${NSELF_PLUGIN_DIR}/content-progress
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_content_progress
    restart: unless-stopped
    ports:
      - "127.0.0.1:3022:3022"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PROGRESS_PLUGIN_PORT=3022
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3022/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ${DOCKER_NETWORK}
