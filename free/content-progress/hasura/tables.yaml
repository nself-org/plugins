# content-progress plugin Hasura metadata
# CODE WINS: table names from internal/db.go (np_progress_* prefix)
# Tables: np_progress_positions (with subscription), np_progress_history,
#         np_progress_watchlists, np_progress_favorites, np_progress_webhook_events
# Row filter: source_account_id + user_id (dual filter — prevents cross-user leaks)

- table:
    schema: public
    name: np_progress_positions
  select_permissions:
    - role: user
      permission:
        columns: "*"
        filter:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
        allow_aggregations: false
  insert_permissions:
    - role: user
      permission:
        columns:
          - user_id
          - content_type
          - content_id
          - position_seconds
          - duration_seconds
          - progress_percent
          - completed
          - completed_at
          - device_id
          - audio_track
          - subtitle_track
          - quality
          - metadata
        check:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - position_seconds
          - duration_seconds
          - progress_percent
          - completed
          - completed_at
          - device_id
          - audio_track
          - subtitle_track
          - quality
          - metadata
        filter:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
  delete_permissions:
    - role: user
      permission:
        filter:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
  configuration:
    custom_root_fields:
      select: progress_positions
      select_by_pk: progress_position
      insert: insert_progress_position
      update: update_progress_position
      delete: delete_progress_position

