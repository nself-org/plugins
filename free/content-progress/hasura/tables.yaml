- table:
    schema: public
    name: np_progress_webhook_events
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns:
          - id
          - source_account_id
          - event_type
          - payload
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  event_triggers:
    - name: progress_positions_updated
      definition:
        enable_manual: false
        insert:
          columns: "*"
        update:
          columns:
            - position_seconds
            - completed
      retry_conf:
        num_retries: 3
        interval_sec: 10
        timeout_sec: 60
      webhook: "{{NSELF_PLUGIN_WEBHOOK_BASE}}/content-progress/hasura-event"
