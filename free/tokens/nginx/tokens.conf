# Tokens plugin nginx configuration
# Note: The nself CLI nginx generator produces this automatically when
# TOKENS_ENABLED=true. This file serves as a reference template only.
# See: cli/src/lib/build/core-modules/nginx-generator.sh
#
# To use a custom config, place it in nginx/conf.d/tokens.conf in your
# nself project directory (hand-managed configs override generated ones).

server {
    listen 443 ssl;
    http2 on;
    server_name tokens.${BASE_DOMAIN};

    ssl_certificate /etc/nginx/ssl/${SSL_DIR}/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/${SSL_DIR}/privkey.pem;

    # Deny access to log files
    location ~* \.(log)$ { deny all; return 404; }

    location / {
        resolver 127.0.0.11 valid=10s;
        set $backend http://tokens:3107;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
