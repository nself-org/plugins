# NSELF-FIRST EXCEPTION: plugin-fragment — hand-authored plugin service definition, merged by `nself build`. Not side-channel.
# Tokens plugin Docker Compose service definition
# Note: The nself CLI generates plugin services automatically from plugin.json
# and the Dockerfile via plugin-services.sh. This file serves as a reference
# for the expected service configuration and can be used for standalone testing.

services:
  tokens:
    build:
      context: ${NSELF_PLUGIN_DIR}/tokens
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_tokens
    restart: unless-stopped
    ports:
      - "127.0.0.1:3107:3107"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - TOKENS_PLUGIN_PORT=3107
      - TOKENS_ENCRYPTION_KEY=${TOKENS_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3107/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ${DOCKER_NETWORK}
