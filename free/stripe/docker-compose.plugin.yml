services:
  stripe:
    image: nself/nself-stripe:latest
    container_name: ${COMPOSE_PROJECT_NAME}_stripe
    restart: unless-stopped
    networks:
      - ${DOCKER_NETWORK}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "3070"
      HOST: "0.0.0.0"
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_API_KEYS: ${STRIPE_API_KEYS:-}
      STRIPE_ACCOUNT_LABELS: ${STRIPE_ACCOUNT_LABELS:-}
      STRIPE_WEBHOOK_SECRETS: ${STRIPE_WEBHOOK_SECRETS:-}
      STRIPE_ACCOUNT_ID: ${STRIPE_ACCOUNT_ID:-}
    ports:
      - "127.0.0.1:3070:3070"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3070/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${PLUGIN_STRIPE_MEMORY:-256m}
          cpus: '${PLUGIN_STRIPE_CPU:-0.5}'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
