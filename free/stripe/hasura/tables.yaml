# stripe plugin Hasura metadata
# CODE WINS: 22 tables from internal/db_schema.go (np_stripe_* prefix)
# PII guard: np_stripe_customers (email, name, phone) — excluded from user role columns
# SECURITY: raw_data JSONB on all tables contains full Stripe API response — admin-only
# Event-trigger: np_stripe_webhook_events insert → /stripe/process

- table:
    schema: public
    name: np_stripe_customers
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - stripe_id
          - currency
          - balance
          - delinquent
          - created_at
          - updated_at
          - source_account_id
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

