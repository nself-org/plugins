# MLflow plugin Docker Compose service definition
# Note: The nself CLI generates plugin services automatically from plugin.json
# and the Dockerfile via plugin-services.sh. This file serves as a reference
# for the expected service configuration and can be used for standalone testing.

services:
  mlflow:
    build:
      context: ${NSELF_PLUGIN_DIR}/mlflow
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_mlflow
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ${DOCKER_NETWORK}

volumes:
  mlflow_data:
    driver: local
