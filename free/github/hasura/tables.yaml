# github plugin Hasura metadata
# CODE WINS: 23 tables from internal/db_schema.go (np_github_* prefix)
# Tables: organizations, repositories, branches, issues, pull_requests, pr_reviews,
#         issue_comments, pr_review_comments, commit_comments, commits, releases, tags,
#         milestones, labels, workflows, workflow_runs, workflow_jobs, check_suites,
#         check_runs, deployments, teams, collaborators, webhook_events
# Event-trigger on np_github_webhook_events insert → event processor

- table:
    schema: public
    name: np_github_organizations
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

