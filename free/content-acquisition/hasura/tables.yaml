# content-acquisition plugin Hasura metadata
# CODE WINS: 14 tables from internal/db.go (np_contentacquisition_* prefix)
# Spec said 8 tables with np_ca_* prefix — actual code uses 14 with np_contentacquisition_* prefix.
# Tables: quality_profiles, acquisition_subscriptions, rss_feeds, rss_feed_items,
#         release_calendar, acquisition_queue, acquisition_history, acquisition_rules,
#         pipeline_runs, downloads, download_state_history, movie_monitoring,
#         download_rules, download_queue
# np_contentacquisition_downloads has user_id — dual row filter applied.
# Event-trigger on np_contentacquisition_download_queue insert → download worker.

- table:
    schema: public
    name: np_contentacquisition_quality_profiles
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: user
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: user
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: user
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

