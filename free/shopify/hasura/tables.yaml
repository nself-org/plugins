- table:
    schema: public
    name: np_shopify_webhook_events
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  event_triggers:
    - name: shopify_webhook_received
      definition:
        enable_manual: false
        insert:
          columns: "*"
      retry_conf:
        num_retries: 3
        interval_sec: 10
        timeout_sec: 60
      webhook: "{{NSELF_PLUGIN_WEBHOOK_BASE}}/shopify/process"
