# shopify plugin Hasura metadata
# CODE WINS: 9 tables from internal/db.go (np_shopify_* prefix)
# PII guard: np_shopify_customers (email/first_name/last_name/phone) — admin-only
#            np_shopify_orders (email/shipping_address/billing_address) — admin-only cols

- table:
    schema: public
    name: np_shopify_shops
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - shopify_id
          - name
          - domain
          - myshopify_domain
          - country
          - currency
          - timezone
          - plan_name
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

