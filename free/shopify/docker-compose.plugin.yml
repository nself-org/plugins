# NSELF-FIRST EXCEPTION: plugin-fragment — hand-authored plugin service definition, merged by `nself build`. Not side-channel.
services:
  shopify:
    build:
      context: ${NSELF_PLUGIN_DIR}/shopify
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_shopify
    restart: unless-stopped
    networks:
      - ${DOCKER_NETWORK}
    ports:
      - "127.0.0.1:3072:3072"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: "3072"
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET:-}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2024-01}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3072/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
