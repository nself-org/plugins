server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          env: ${ENV:-dev}
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: (?P<container_name>(?:[^|]*))\|(?P<image_name>(?:[^|]*))
          source: tag
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          stream:
          container_name:
          image_name:
          env:
      - output:
          source: output
      # H03 #174+#175: Extract structured JSON log fields into Loki labels
      # Handles nSelf plugin JSON logs: {"level":"info","trace_id":"...","plugin":"ai",...}
      - json:
          expressions:
            nself_level: level
            nself_trace_id: trace_id
            nself_plugin: plugin
          source: output
      - labels:
          nself_level:
          nself_trace_id:
          nself_plugin:

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
