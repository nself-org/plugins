global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Uncomment if Redis is enabled in your stack
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  - job_name: "hasura"
    metrics_path: /v1/metrics
    static_configs:
      - targets: ["hasura:8080"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
