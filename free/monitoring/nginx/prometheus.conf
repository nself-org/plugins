# Prometheus reverse proxy.
# Templated by nself build: ${BASE_DOMAIN} and ssl_dir are replaced at build time.
# SSL cert path follows the nself convention: dots replaced with dashes in the domain.
server {
    listen 443 ssl;
    http2 on;
    server_name ${PROMETHEUS_ROUTE}.${BASE_DOMAIN};

    ssl_certificate /etc/nginx/ssl/${SSL_DIR}/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/${SSL_DIR}/privkey.pem;

    # Deny access to log files
    location ~* \.(log)$ { deny all; return 404; }

    resolver 127.0.0.11 valid=10s;
    set $upstream http://prometheus:9090;

    location / {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
