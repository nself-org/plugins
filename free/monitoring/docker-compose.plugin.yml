# Monitoring Plugin - Docker Compose Services
# All 10 monitoring services for the nself monitoring stack.
#
# Required env vars (from .env.computed):
#   COMPOSE_PROJECT_NAME - Project name prefix for container names
#   DOCKER_NETWORK       - Docker network name
#   POSTGRES_USER        - PostgreSQL username (for postgres-exporter)
#   POSTGRES_PASSWORD    - PostgreSQL password (for postgres-exporter)
#   POSTGRES_DB          - PostgreSQL database (for postgres-exporter)
#
# Optional env vars:
#   GRAFANA_ADMIN_USER       - Grafana admin username (default: admin)
#   GRAFANA_ADMIN_PASSWORD   - Grafana admin password (default: admin)
#   PROMETHEUS_RETENTION_TIME - Prometheus data retention (default: 15d)
#   REDIS_ENABLED            - Set to "true" to include redis-exporter

services:
  # --- Metrics Collection ---

  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME}_prometheus
    user: "65534:65534"
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - "${DOCKER_NETWORK}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Visualization ---

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME}_grafana
    user: "472:472"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${GRAFANA_ROUTE:-grafana}.${BASE_DOMAIN:-localhost}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - "${DOCKER_NETWORK}"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --- Log Aggregation ---

  loki:
    image: grafana/loki:latest
    container_name: ${COMPOSE_PROJECT_NAME}_loki
    user: "10001:10001"
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - "${DOCKER_NETWORK}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  promtail:
    image: grafana/promtail:latest
    container_name: ${COMPOSE_PROJECT_NAME}_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - "${DOCKER_NETWORK}"
    depends_on:
      loki:
        condition: service_healthy

  # --- Distributed Tracing ---

  # NOTE: Tempo uses a distroless image with no shell. Do NOT add a healthcheck.
  tempo:
    image: grafana/tempo:latest
    container_name: ${COMPOSE_PROJECT_NAME}_tempo
    user: "10001:10001"
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:14268:14268"
    networks:
      - "${DOCKER_NETWORK}"

  # --- Alerting ---

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ${COMPOSE_PROJECT_NAME}_alertmanager
    user: "65534:65534"
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - "${DOCKER_NETWORK}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Exporters ---

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ${COMPOSE_PROJECT_NAME}_cadvisor
    privileged: true
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8082:8080"
    networks:
      - "${DOCKER_NETWORK}"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME}_node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - "${DOCKER_NETWORK}"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME}_postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"
    networks:
      - "${DOCKER_NETWORK}"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Optional: Redis Exporter ---
  # Only useful if REDIS_ENABLED=true in your .env.
  # If Redis is not part of your stack, this service will fail to connect.
  # To exclude it, remove or comment out this block.
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: ${COMPOSE_PROJECT_NAME}_redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - "${DOCKER_NETWORK}"
    profiles:
      - redis

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  alertmanager_data:
