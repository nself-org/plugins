# NSELF-FIRST EXCEPTION: plugin-fragment — hand-authored plugin service definition, merged by `nself build`. Not side-channel.
#
# Forgejo + Forgejo Actions Runner — ops profile plugin
# Port:  3844 (HTTP)  ·  3222 (SSH)  ·  F10-PORT-REGISTRY
# Profile: ops  (include via nself build --profile ops)
#
# Auto-bootstrap (zero manual steps):
#   1. forgejo-init runs once after Forgejo is healthy.
#      • Creates admin user (idempotent — safe to re-run).
#      • Generates a runner registration token via the Forgejo API.
#      • Writes the token to forgejo_runner_config volume (/data/token).
#   2. forgejo-runner reads the token and registers itself — idempotent
#      (skips re-registration if /data/.runner state file already exists).
#
# Resource limits (untrusted workflow code sandboxing):
#   - forgejo:        mem=512m  cpu=1.0  (idle ~80MB)
#   - forgejo-runner: mem=192m  cpu=0.5  (idle <200MB — SPIKE §3.7 threshold)
#   - forgejo-init:   mem=128m  cpu=0.25 (short-lived bootstrap)
#
# Required env vars (set in .env or pass via nself secrets):
#   NSELF_FORGEJO_ADMIN_USER          — Forgejo admin username (first boot)
#   NSELF_FORGEJO_ADMIN_PASSWORD      — Forgejo admin password (min 8 chars)
#   NSELF_FORGEJO_ADMIN_EMAIL         — Forgejo admin email address
#   FORGEJO_RUNNER_REGISTRATION_TOKEN — optional pre-shared runner token;
#                                       when blank, forgejo-init generates one
#
# Optional env vars (defaults shown):
#   FORGEJO_HTTP_PORT=3844
#   FORGEJO_SSH_PORT=3222
#   FORGEJO_DOMAIN=localhost
#   FORGEJO_RUNNER_NAME=nself-runner
#   FORGEJO_RUNNER_LABELS=ubuntu-latest:docker://node:20-bullseye,...
#   FORGEJO_RUNNER_CAPACITY=1
#   FORGEJO_RUNNER_MEMORY=192m
#   FORGEJO_RUNNER_CPU=0.5

services:

  # ─── Forgejo server ────────────────────────────────────────────────────────
  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    container_name: ${COMPOSE_PROJECT_NAME:-nself}_forgejo
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      # Double-underscore env vars are the Forgejo/Gitea config injection mechanism.
      # See: https://forgejo.org/docs/latest/admin/config-cheat-sheet/
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__DOMAIN: ${FORGEJO_DOMAIN:-localhost}
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: "http://${FORGEJO_DOMAIN:-localhost}:${FORGEJO_HTTP_PORT:-3844}/"
      GITEA__server__SSH_DOMAIN: ${FORGEJO_DOMAIN:-localhost}
      GITEA__server__SSH_PORT: "${FORGEJO_SSH_PORT:-3222}"
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__server__BUILTIN_SSH_SERVER_USER: git
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__log__LEVEL: Warn
      # Forgejo Actions (CI) must be explicitly enabled.
      GITEA__actions__ENABLED: "true"
      GITEA__actions__DEFAULT_ACTIONS_URL: "https://code.forgejo.org"
    ports:
      - "127.0.0.1:${FORGEJO_HTTP_PORT:-3844}:3000"
      - "127.0.0.1:${FORGEJO_SSH_PORT:-3222}:22"
    volumes:
      - forgejo_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - nself_network
      - forgejo_runner_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/-/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 96m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Bootstrap init container ──────────────────────────────────────────────
  # restart: "no"  — runs exactly once per stack lifecycle.
  # forgejo-init completes when forgejo-bootstrap.sh exits 0.
  # forgejo-runner depends on service_completed_successfully so it only
  # starts after the token is available.
  #
  # Token generation mechanism:
  #   POST /api/v1/user/actions/runners/registration-token  (Basic auth, admin)
  #   Response: {"token":"<value>"}
  #   Token written to /runner-config/token (mode 600, shared volume).
  #
  # Reference: https://forgejo.org/docs/latest/admin/actions/
  forgejo-init:
    image: codeberg.org/forgejo/forgejo:9
    container_name: ${COMPOSE_PROJECT_NAME:-nself}_forgejo_init
    restart: "no"
    depends_on:
      forgejo:
        condition: service_healthy
    environment:
      NSELF_FORGEJO_ADMIN_USER: ${NSELF_FORGEJO_ADMIN_USER}
      NSELF_FORGEJO_ADMIN_PASSWORD: ${NSELF_FORGEJO_ADMIN_PASSWORD}
      NSELF_FORGEJO_ADMIN_EMAIL: ${NSELF_FORGEJO_ADMIN_EMAIL}
      FORGEJO_RUNNER_REGISTRATION_TOKEN: ${FORGEJO_RUNNER_REGISTRATION_TOKEN:-}
    volumes:
      - forgejo_data:/data
      - forgejo_runner_config:/runner-config
      - ./forgejo-bootstrap.sh:/forgejo-bootstrap.sh:ro
    networks:
      - forgejo_runner_net
    entrypoint: ["/bin/sh", "/forgejo-bootstrap.sh"]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  # ─── Forgejo Actions runner ─────────────────────────────────────────────────
  # Isolated to forgejo_runner_net (cannot reach postgres/hasura/auth).
  # Uses docker.sock bind-mount so workflow steps can spin up Docker containers
  # (same pattern as github-runner plugin).
  #
  # Registration: runner-entrypoint.sh reads /data/token (written by forgejo-init),
  # calls `forgejo-runner register --no-interactive`, then starts the daemon.
  # Idempotent: skips registration if /data/.runner state file already exists.
  forgejo-runner:
    image: code.forgejo.org/forgejo/runner:6
    container_name: ${COMPOSE_PROJECT_NAME:-nself}_forgejo_runner
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_healthy
      forgejo-init:
        condition: service_completed_successfully
    environment:
      FORGEJO_INSTANCE_URL: "http://forgejo:3000"
      FORGEJO_RUNNER_NAME: ${FORGEJO_RUNNER_NAME:-nself-runner}
      FORGEJO_RUNNER_LABELS: ${FORGEJO_RUNNER_LABELS:-ubuntu-latest:docker://node:20-bullseye,ubuntu-22.04:docker://node:20-bullseye}
      FORGEJO_RUNNER_CAPACITY: ${FORGEJO_RUNNER_CAPACITY:-1}
    volumes:
      - forgejo_runner_config:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner-entrypoint.sh:/runner-entrypoint.sh:ro
    networks:
      - forgejo_runner_net
    entrypoint: ["/bin/sh", "/runner-entrypoint.sh"]
    deploy:
      resources:
        limits:
          memory: ${FORGEJO_RUNNER_MEMORY:-192m}
          cpus: "${FORGEJO_RUNNER_CPU:-0.5}"
        reservations:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  forgejo_data:
    name: ${COMPOSE_PROJECT_NAME:-nself}_forgejo_data
  forgejo_runner_config:
    name: ${COMPOSE_PROJECT_NAME:-nself}_forgejo_runner_config

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  # nself_network: shared with the main nSelf stack. Declared external so this
  # fragment composes cleanly with the base docker-compose.yml (which defines
  # the network). When run standalone, create it first:
  #   docker network create nself_network
  nself_network:
    external: true

  # forgejo_runner_net: runner-only isolated bridge. Runner jobs cannot reach
  # postgres/hasura/auth; they can only reach Forgejo (also on this network).
  # external: false — this plugin owns it.
  forgejo_runner_net:
    name: ${COMPOSE_PROJECT_NAME:-nself}_forgejo_runner_net
    driver: bridge
    internal: false
