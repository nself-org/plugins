# invitations plugin Hasura metadata
# CODE WINS: 1 table from internal/db.go: np_invitations_invitations
# Note: Go schema missing source_account_id — use migration 002 to add it
# Admin CRUD; public token-based lookup (no row filter — token is the auth factor)
# Event-trigger on insert → delivery handler

- table:
    schema: public
    name: np_invitations_invitations
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: anonymous
      permission:
        columns:
          - id
          - email
          - role
          - status
          - expires_at
          - accepted_at
          - created_at
        filter:
          token:
            _eq: X-Hasura-Invitation-Token
  insert_permissions:
    - role: admin
      permission:
        columns:
          - id
          - email
          - role
          - token
          - status
          - invited_by
          - expires_at
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns:
          - status
          - role
          - expires_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  event_triggers:
    - name: invitation_created
      definition:
        enable_manual: false
        insert:
          columns: "*"
      retry_conf:
        num_retries: 3
        interval_sec: 10
        timeout_sec: 60
      webhook: "{{NSELF_PLUGIN_WEBHOOK_BASE}}/invitations/deliver"
