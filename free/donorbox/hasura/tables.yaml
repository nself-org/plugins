# donorbox plugin Hasura metadata
# CODE WINS: 7 tables from internal/db.go (np_donorbox_* prefix)
# Admin CRUD on all tables (webhook-sync only); admin+self read on donors/donations
# Event-trigger on np_donorbox_webhook_events insert → webhook processor
# PII: donor email/name admin-only (not in user select columns)

- table:
    schema: public
    name: np_donorbox_campaigns
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - name
          - slug
          - currency
          - goal_amount
          - total_raised
          - donations_count
          - is_active
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

