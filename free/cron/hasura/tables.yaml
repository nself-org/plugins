# Purpose: Hasura metadata for the cron plugin.
# Tables: np_cron_jobs, np_cron_runs
# Permissions: user CRUD on np_cron_jobs (own rows); user+admin select on np_cron_runs
# Event trigger: np_cron_runs insert fires webhook to plugin notify endpoint
# SPORT: REGISTRY-PLUGINS.md cron row — schema ✅, Hasura ✅
- table:
    schema: public
    name: np_cron_jobs
  configuration:
    custom_root_fields: {}
    custom_column_names: {}
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter: {}
        allow_aggregations: true
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - name
          - cron_expr
          - callback_url
          - payload
          - enabled
          - last_run_at
          - next_run_at
          - run_count
          - max_attempts
          - created_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        allow_aggregations: false
  insert_permissions:
    - role: user
      permission:
        columns:
          - name
          - cron_expr
          - callback_url
          - payload
          - enabled
          - max_attempts
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - name
          - cron_expr
          - callback_url
          - payload
          - enabled
          - max_attempts
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: user
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

- table:
    schema: public
    name: np_cron_runs
  configuration:
    custom_root_fields: {}
    custom_column_names: {}
  event_triggers:
    - name: cron_run_inserted
      definition:
        enable_manual: false
        insert:
          columns: "*"
      retry_conf:
        num_retries: 3
        interval_sec: 10
        timeout_sec: 60
      webhook: "{{NSELF_PLUGIN_CRON_WEBHOOK_URL}}/events/cron-run"
      headers:
        - name: X-Nself-Event-Secret
          value_from_env: NSELF_PLUGIN_CRON_EVENT_SECRET
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter: {}
        allow_aggregations: true
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - job_id
          - started_at
          - completed_at
          - status
          - http_status
          - error
          - duration_ms
          - attempt
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        allow_aggregations: false
