# notifications plugin Hasura metadata
# CODE WINS: table names from internal/db.go (np_notifications_* prefix)
# Admin CRUD on templates; user read on inbox (source_account_id + recipient filter);
# user CRUD on preferences; event-trigger on np_notifications_notifications insert

- table:
    schema: public
    name: np_notifications_templates
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns:
          - id
          - name
          - channel
          - subject_template
          - body_template
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns:
          - name
          - channel
          - subject_template
          - body_template
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

- table:
    schema: public
    name: np_notifications_notifications
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - channel
          - recipient
          - template
          - status
          - sent_at
          - created_at
        filter:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - recipient:
                _eq: X-Hasura-User-Id
  insert_permissions:
    - role: admin
      permission:
        columns:
          - id
          - channel
          - recipient
          - template
          - data
          - status
          - sent_at
          - error
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  event_triggers:
    - name: notification_inserted
      definition:
        enable_manual: false
        insert:
          columns: "*"
      retry_conf:
        num_retries: 3
        interval_sec: 15
        timeout_sec: 60
      webhook: "{{NSELF_PLUGIN_WEBHOOK_BASE}}/notifications/deliver"

- table:
    schema: public
    name: np_notifications_preferences
  select_permissions:
    - role: user
      permission:
        columns: "*"
        filter:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
  insert_permissions:
    - role: user
      permission:
        columns:
          - user_id
          - email_enabled
          - push_enabled
          - sms_enabled
          - quiet_start
          - quiet_end
          - channels
        check:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - email_enabled
          - push_enabled
          - sms_enabled
          - quiet_start
          - quiet_end
          - channels
        filter:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
  delete_permissions:
    - role: user
      permission:
        filter:
          _and:
            - source_account_id:
                _eq: X-Hasura-Source-Account-Id
            - user_id:
                _eq: X-Hasura-User-Id
