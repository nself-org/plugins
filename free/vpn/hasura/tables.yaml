# vpn plugin Hasura metadata
# CODE WINS: 8 tables from internal/db_schema.go (np_vpn_* prefix)
# SECURITY: np_vpn_credentials — encrypted columns NEVER exposed via GraphQL (admin-only, no user role)
# SSRF note: api_endpoint column stored in DB but URL validation enforced in Go layer at write
# User-facing: providers (read-only list), servers (read-only), connections (own), downloads (own)

- table:
    schema: public
    name: np_vpn_providers
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - name
          - display_name
          - cli_available
          - api_available
          - port_forwarding_supported
          - p2p_all_servers
          - p2p_server_count
          - total_servers
          - total_countries
          - wireguard_supported
          - openvpn_supported
          - kill_switch_available
          - split_tunneling_available
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

