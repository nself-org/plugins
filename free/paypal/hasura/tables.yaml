# paypal plugin Hasura metadata
# CODE WINS: 14 tables from internal/db.go (np_paypal_* prefix)
# PII: payer_email/payer_name in np_paypal_transactions and np_paypal_payers — admin-only columns
# SECURITY: payers table has email/name/phone — excluded from user role
# Event-trigger on np_paypal_webhook_events insert → webhook processor

- table:
    schema: public
    name: np_paypal_transactions
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - paypal_id
          - type
          - status
          - amount
          - currency
          - fee
          - net
          - description
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns: "*"
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

