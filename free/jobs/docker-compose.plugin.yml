services:
  nself-jobs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nself-jobs
    restart: unless-stopped
    ports:
      - "3105:3105"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JOBS_PORT=3105
      - JOBS_POLL_INTERVAL_MS=${JOBS_POLL_INTERVAL_MS:-1000}
      - JOBS_RETRY_ATTEMPTS=${JOBS_RETRY_ATTEMPTS:-3}
    depends_on:
      - postgres
    networks:
      - nself-network
