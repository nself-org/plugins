# jobs plugin Hasura metadata
# CODE WINS: table names from internal/db_schema.go
# 3 tables: np_jobs_queues, np_jobs_jobs, np_jobs_history
# Admin CRUD on np_jobs_jobs; admin read on np_jobs_history and np_jobs_queues
# Event-trigger on np_jobs_jobs insert → /jobs/notify to wake runner

- table:
    schema: public
    name: np_jobs_queues
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter: {}
  insert_permissions:
    - role: admin
      permission:
        columns:
          - name
        check: {}
  delete_permissions:
    - role: admin
      permission:
        filter: {}

- table:
    schema: public
    name: np_jobs_jobs
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        columns:
          - queue
          - payload
          - priority
          - max_attempts
          - scheduled_at
          - callback_url
          - sign_payload
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: admin
      permission:
        columns:
          - status
          - attempts
          - error
          - started_at
          - completed_at
          - last_status_code
          - last_duration_ms
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  event_triggers:
    - name: jobs_job_inserted
      definition:
        enable_manual: false
        insert:
          columns: "*"
      retry_conf:
        num_retries: 3
        interval_sec: 10
        timeout_sec: 60
      webhook: "{{NSELF_PLUGIN_WEBHOOK_BASE}}/jobs/notify"

- table:
    schema: public
    name: np_jobs_history
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter: {}
