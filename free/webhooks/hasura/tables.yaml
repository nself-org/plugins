- table:
    name: np_webhooks_endpoints
    schema: public
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - url
          - description
          - events
          - enabled
          - failure_count
          - last_success_at
          - last_failure_at
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        columns:
          - source_account_id
          - url
          - description
          - secret
          - events
          - headers
          - enabled
          - metadata
  update_permissions:
    - role: admin
      permission:
        columns:
          - url
          - description
          - events
          - headers
          - enabled
          - metadata
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: admin
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

- table:
    name: np_webhooks_deliveries
    schema: public
  object_relationships:
    - name: endpoint
      using:
        foreign_key_constraint_on: endpoint_id
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - endpoint_id
          - event_type
          - status
          - response_status
          - attempt_count
          - delivered_at
          - created_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  insert_permissions:
    - role: admin
      permission:
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        columns:
          - source_account_id
          - endpoint_id
          - event_type
          - payload
          - status
          - signature
  event_triggers:
    - name: webhooks_delivery_insert
      definition:
        enable_manual: false
        insert:
          columns: "*"
      retry_conf:
        interval_sec: 10
        num_retries: 3
        timeout_sec: 60
      webhook: "{{WEBHOOKS_EVENT_TRIGGER_URL}}"
      headers:
        - name: X-Nself-Plugin
          value: webhooks
