server {
    listen 443 ssl;
    http2 on;
    server_name audit-log.${BASE_DOMAIN};

    ssl_certificate /etc/nginx/ssl/${SSL_DIR}/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/${SSL_DIR}/privkey.pem;

    resolver 127.0.0.11 valid=10s;
    set $upstream http://audit-log:3308;

    # POST /events is an internal ingestion endpoint.
    # It is protected by X-Plugin-Secret at the application layer.
    # At the nginx layer we additionally restrict it to requests originating
    # from the internal Docker network (127.0.0.0/8 and 172.16.0.0/12).
    location = /events {
        limit_except GET POST OPTIONS {
            deny all;
        }

        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
