# Purpose: Hasura metadata for the push plugin.
# Tables: np_push_devices, np_push_outbox
# Permissions: user CRUD on own devices; admin+user read on outbox; event-trigger on outbox insert
# SPORT: REGISTRY-PLUGINS.md push row — schema ✅, Hasura ✅
- table:
    schema: public
    name: np_push_devices
  configuration:
    custom_root_fields: {}
    custom_column_names: {}
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter: {}
        allow_aggregations: true
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - device_token
          - platform
          - app_id
          - user_id
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        allow_aggregations: false
  insert_permissions:
    - role: user
      permission:
        columns:
          - device_token
          - platform
          - app_id
          - user_id
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        set:
          source_account_id: X-Hasura-Source-Account-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - user_id
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        check:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
  delete_permissions:
    - role: user
      permission:
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id

- table:
    schema: public
    name: np_push_outbox
  configuration:
    custom_root_fields: {}
    custom_column_names: {}
  event_triggers:
    - name: push_outbox_inserted
      definition:
        enable_manual: false
        insert:
          columns: "*"
      retry_conf:
        num_retries: 3
        interval_sec: 10
        timeout_sec: 60
      webhook: "{{NSELF_PLUGIN_PUSH_RELAY_URL}}/events/push-outbox"
      headers:
        - name: X-Nself-Event-Secret
          value_from_env: NSELF_PLUGIN_PUSH_EVENT_SECRET
  select_permissions:
    - role: admin
      permission:
        columns: "*"
        filter: {}
        allow_aggregations: true
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - device_token
          - platform
          - payload
          - status
          - attempts
          - last_error
          - dedupe_hash
          - created_at
          - updated_at
        filter:
          source_account_id:
            _eq: X-Hasura-Source-Account-Id
        allow_aggregations: false
