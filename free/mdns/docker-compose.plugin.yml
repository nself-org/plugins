# mDNS plugin Docker Compose service definition
# Note: The nself CLI generates plugin services automatically from plugin.json
# and the Dockerfile via plugin-services.sh. This file serves as a reference
# for the expected service configuration and can be used for standalone testing.

services:
  mdns:
    build:
      context: ${NSELF_PLUGIN_DIR}/mdns
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_mdns
    restart: unless-stopped
    ports:
      - "127.0.0.1:3216:3216"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PORT=3216
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3216/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ${DOCKER_NETWORK}
