name: Feature Request
description: Suggest a new plugin or improvement to an existing one
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Check [existing feature requests](https://github.com/nself-org/plugins/issues?q=label%3Afeature) first.
        For large proposals, open a [Discussion](https://github.com/nself-org/plugins/discussions) first.
  - type: input
    id: plugin_name
    attributes:
      label: Plugin name (existing or proposed new plugin)
      placeholder: "e.g. stripe, or 'new: twilio'"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the problem or gap
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
