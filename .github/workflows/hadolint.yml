name: Dockerfile Lint

on:
  push:
    paths:
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/.hadolint.yaml"
    branches: [main]
  pull_request:
    paths:
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/.hadolint.yaml"

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error
          ignore: DL3008,DL3009,DL3015
