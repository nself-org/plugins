name: Go Build & Test (free plugins)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  go-build-test:
    name: Build & test all Go plugins
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build, vet, and test every Go plugin
        run: |
          failed=0
          for d in free/*/; do
            if [ -f "$d/go.mod" ]; then
              echo "=== $d ==="
              ( cd "$d" && go build ./... && go vet ./... && go test ./... ) || { echo "FAIL: $d"; failed=1; }
            fi
          done
          exit $failed
